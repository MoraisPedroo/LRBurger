<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L&R Burger - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tela-login">

        <div class="topo">
            <img src="logo.png" alt="L&R Burger" class="logo">
            <p class="frase">Plataforma para gestão de Entregas.</p>
        </div>

        <div class="centro">
            <div class="area-login">

                <img src="motoboy.png" alt="Motoboy" class="motoboy">

                <div class="formulario">
                    <form id="formLogin" onsubmit="entrar(event)">

                        <label for="usuario">Usuário ou E-mail</label>
                        <div class="campo">
                            <span class="icone">&#128100;</span>
                            <input type="text" id="usuario" placeholder="Digite seu usuário" required>
                        </div>

                        <label for="senha">Senha</label>
                        <div class="campo">
                            <input type="password" id="senha" placeholder="Digite sua senha" required>
                            <span class="icone-olho" onclick="mostrarSenha()">&#128065;</span>
                        </div>

                        <a href="#" class="esqueceu">Esqueceu sua senha?</a>

                        <button type="submit" class="botao-entrar">Entrar</button>
                    </form>
                </div>

            </div>
        </div>

        <div class="rodape">
            <p class="aviso">Acesso Restrito Para Administração</p>
            <div class="links">
                <a href="#">Sou cliente</a>
                <a href="#">Sou Entregador</a>
            </div>
        </div>

        <a href="https://wa.me/5500000000000" class="whatsapp" target="_blank">
            <span>&#128241;</span>
        </a>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
    <script>carregarLogin();</script>
</body>
</html>
